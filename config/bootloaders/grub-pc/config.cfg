set default=0
set timeout=5

if [ x$feature_default_font_path = xy ] ; then
    font=unicode
else
    font=$prefix/unicode.pf2
fi

if loadfont $font ; then
    set gfxmode=auto
    set gfxpayload=keep
    insmod all_video
    insmod efi_gop
    insmod efi_uga
fi

insmod gfxterm
insmod png
terminal_output gfxterm

source /boot/grub/theme.cfg
